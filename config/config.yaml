# Openagent-Github-Bridge 配置文件
# 环境变量优先级高于配置文件

server:
  host: "0.0.0.0"
  port: 7777
  read_timeout: "30s"
  write_timeout: "30s"

github:
  # GitHub Webhook 密钥 (用于验证签名)
  webhook_secret: "${GITHUB_WEBHOOK_SECRET}"
  # GitHub Personal Access Token 或 GitHub App Token
  token: "${GITHUB_TOKEN}"
  # 可选：GitHub App 配置
  app_id: ""
  app_private_key_path: ""
  # API 基础 URL (企业版可自定义)
  api_base_url: "https://api.github.com"

# OpenCode Server 配置 (默认/单仓库模式)
# Reference: https://open-code.ai/docs/en/server
#
# 重要：OpenCode 必须在仓库目录中启动
# 示例：cd ~/repos/owner/repo && opencode --server --port 4096
opencode:
  # OpenCode Server 地址 (默认端口 4096)
  host: "${OPENCODE_HOST:http://localhost:4096}"
  # HTTP Basic Auth 用户名 (可选，默认 "opencode")
  # Reference: https://open-code.ai/docs/en/server#authentication
  username: "${OPENCODE_SERVER_USERNAME:opencode}"
  # HTTP Basic Auth 密码 (可选，留空则不启用鉴权)
  password: "${OPENCODE_SERVER_PASSWORD:}"
  # 可选：默认仓库克隆地址覆盖；未配置时回退到 GitHub webhook payload 中的 clone_url
  clone_url: "${OPENCODE_CLONE_URL:}"
  # 默认模型
  default_model: "opencode/big-pickle"
  # 请求超时
  timeout: "120s"
  # Agent 侧 workspace-manager 地址
  workspace_manager_host: "${WORKSPACE_MANAGER_HOST:http://localhost:4081}"
  # workspace-manager Basic Auth 用户名
  workspace_manager_username: "${WORKSPACE_MANAGER_USERNAME:workspace-manager}"
  # workspace-manager Basic Auth 密码 (留空则不启用鉴权)
  workspace_manager_password: "${WORKSPACE_MANAGER_PASSWORD:}"

# 多仓库模式配置 (可选)
# 当需要支持多个仓库时，为每个仓库配置独立的 OpenCode 实例
# 格式: "owner/repo" -> OpenCode 配置
#
# 每个 OpenCode 实例必须在对应仓库目录中启动：
#   cd ~/repos/owner1/repo1 && opencode --server --port 4096
#   cd ~/repos/owner2/repo2 && opencode --server --port 4097
#
# repositories:
#   "owner1/repo1":
#     opencode_host: "http://localhost:4096"
#     opencode_username: "opencode"
#     opencode_password: ""
#     clone_url: "git@github.com:owner1/repo1.git"
#     workspace_manager_host: "http://localhost:4081"
#     workspace_manager_username: "workspace-manager"
#     workspace_manager_password: ""
#   "owner2/repo2":
#     opencode_host: "http://localhost:4097"
#     opencode_username: "opencode"
#     opencode_password: ""
  #     clone_url: "git@github.com:owner2/repo2.git"
#     workspace_manager_host: "http://localhost:4082"
#     workspace_manager_username: "workspace-manager"
#     workspace_manager_password: ""

queue:
  # 工作协程数量
  workers: 5
  # 任务队列缓冲大小
  buffer_size: 100

session:
  # 存储类型: memory | redis
  storage: "memory"
  # Session 过期时间
  ttl: "24h"
  # Redis 配置 (当 storage 为 redis 时生效)
  redis:
    addr: "localhost:6379"
    password: ""
    db: 0

log:
  # 日志级别: debug | info | warn | error
  level: "info"
  # 日志格式: json | text
  format: "json"

# 触发配置 (通用)
trigger:
  # 用于触发 Agent 的前缀；必须出现在评论第一行开头，避免普通文本或后续行里顺带提到时误触发
  prefix: "@ogb-bot"
  # 是否响应所有 Issue (否则只响应带前缀的)
  respond_all_issues: false

# 功能开关配置
# 原则：只有实际触发动作的事件才需要 enable 配置
features:
  # AI-Fix 标签触发功能
  ai_fix:
    enabled: true
    labels:
      - "ai-fix"
    # Issue 被打上 ai-plan 标签时，只做方案设计
    plan_label_trigger_enabled: true
    plan_labels:
      - "ai-plan"
    # Issue 评论以 /go 开头时，按既有上下文触发编码
    comment_trigger_enabled: true
    comment_commands:
      - "/go"

  # PR 自动 Review 功能
  pr_review:
    # PR 创建时自动 review (会检查 draft/bot 状态)
    enabled: false
    skip_draft_prs: true
    skip_bot_prs: true
    # PR 被打上标签时触发 review (不检查 draft/bot)
    label_trigger_enabled: true
    labels:
      - "ai-review"
